<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow-x: hidden;
}

.container {
    padding: 20px;
    margin-top: 40px;
}

h1 {
    font-size: 2.5rem;
    color: white;
    margin-bottom: 10px;
}

h2 {
    font-size: 1.5rem;
    color: white;
    margin-bottom: 20px;
}

p {
    font-size: 1.1rem;
    color: white;
    max-width: 500px;
    margin: auto;
    padding: 10px;
}

button {
    padding: 12px 22px;
    font-size: 1rem;
    border: none;
    border-radius: 25px;
    background-color: white;
    color: #ff4b5c;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

button:hover {
    background-color: #ffe5e9;
}

/* Balloon animation */

.balloon {
    width: 50px;
    height: 70px;
    background-color: red;
    border-radius: 50%;
    position: absolute;
    bottom: -100px;
    animation: floatUp 8s linear infinite;
}

.balloon:nth-child(1) {
    left: 10%;
    background: #ff4b5c;
    animation-delay: 0s;
}

.balloon:nth-child(2) {
    left: 40%;
    background: #ffd93d;
    animation-delay: 2s;
}

.balloon:nth-child(3) {
    left: 70%;
    background: #6bcf7f;
    animation-delay: 4s;
}

@keyframes floatUp {
    from {
        transform: translateY(0);
    }
    to {
        transform: translateY(-110vh);
    }
}

/* Confetti */

.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    background-color: red;
    top: -10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(720deg);
    }
}

/* Mobile responsive */

@media (max-width: 600px) {

h1 {
    font-size: 2rem;
}

h2 {
    font-size: 1.3rem;
}

p {
    font-size: 1rem;
}

button {
    font-size: 0.9rem;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday 🎂</h1>

<h2 id="name">Dear Friend 💖</h2>

<p>
Wishing you a day filled with happiness, laughter, and unforgettable moments.
May all your dreams come true and your year ahead be full of success and joy! ✨
</p>

<button onclick="startConfetti()">
Celebrate 🎉
</button>

</div>

<!-- Balloons -->

<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<script>

/* Confetti Generator */

function startConfetti() {

for (let i = 0; i < 100; i++) {

let confetti = document.createElement("div");

confetti.classList.add("confetti");

confetti.style.left = Math.random() * 100 + "vw";

confetti.style.animationDuration =
(Math.random() * 3 + 2) + "s";

confetti.style.backgroundColor =
"rgb(" +
Math.floor(Math.random() * 255) + "," +
Math.floor(Math.random() * 255) + "," +
Math.floor(Math.random() * 255) + ")";

document.body.appendChild(confetti);

}

}

</script>

</body>
</html>
